<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Concentra — Challenges Program Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700;800&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#236192"/>
    <g fill="#ed8b00"><rect x="44" y="22" width="12" height="56" rx="1"/><rect x="22" y="44" width="56" height="12" rx="1"/></g>
  </svg>
</template>
<style>
  :root{
    --blue:#236192; --blue-deep:#1a4a72; --blue-ink:#14365a;
    --orange:#ed8b00; --orange-deep:#c47200;
    --paper:#fff; --ink:#1a1a1a; --text:#2a2f36; --muted:#6a7180;
    --rule:#d8dde3; --soft-bg:#f4f6f9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Source Sans 3","Helvetica Neue",Arial,sans-serif;
    color:var(--text); background:#e9ecef;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }

  /* ============ MODE: PAGED PRINT-PREVIEW ============ */
  .stack{
    display:flex; flex-direction:column; align-items:center; gap:24px;
    padding:32px 16px 80px;
  }
  .toolbar{
    position:sticky; top:0; z-index:20;
    background:#fff; border-bottom:1px solid var(--rule);
    padding:10px 24px;
    display:flex; align-items:center; justify-content:space-between;
    gap:16px;
  }
  .toolbar .left{display:flex; align-items:center; gap:14px}
  .toolbar .brand{
    font-weight:700; color:var(--blue-ink); font-size:13px; letter-spacing:.04em;
  }
  .toolbar .meta{font-size:11px; color:var(--muted); letter-spacing:.06em}
  .modes{display:flex; gap:6px}
  .mode-btn{
    background:#fff; border:1px solid var(--rule); color:var(--blue-ink);
    font:inherit; font-size:12px; font-weight:700; letter-spacing:.06em;
    padding:7px 14px; border-radius:999px; cursor:pointer;
  }
  .mode-btn.active{background:var(--blue); color:#fff; border-color:var(--blue)}
  .print-btn{
    background:var(--orange); color:#fff; border:0;
    font:inherit; font-size:12px; font-weight:700; letter-spacing:.08em;
    padding:8px 16px; border-radius:999px; cursor:pointer;
  }
  .print-btn:hover{background:var(--orange-deep)}

  /* ============ PAGE (8.5 x 11 @ 96dpi) ============ */
  .page{
    width:816px; height:1056px;
    background:var(--paper);
    box-shadow: 0 8px 28px rgba(20,30,55,.18), 0 1px 2px rgba(0,0,0,.06);
    position:relative; overflow:hidden;
    color:var(--text);
    page-break-after:always; break-after:page;
  }

  /* ============ SHARED ============ */
  .hex-pat-bg{
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='70' viewBox='0 0 80 70'><polygon points='40,2 76,22 76,62 40,82 4,62 4,22' fill='none' stroke='white' stroke-width='1' stroke-opacity='0.10'/></svg>");
    background-size:80px 70px;
  }
  .hex {
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    background-position:center; background-size:cover;
  }

  /* ============ COVER ============ */
  .cover{
    background:var(--blue);
    color:#fff;
    display:flex; flex-direction:column;
    padding:72px 64px 0;
    position:relative;
  }
  .cover__cross{position:absolute; top:56px; left:64px; width:56px; height:56px; z-index:2}
  .cover__cross svg{width:100%; height:100%; display:block}
  .cover__year{
    font-size:12px; letter-spacing:.32em; font-weight:600;
    color:rgba(255,255,255,.85); align-self:flex-end;
  }
  .cover__hex-art{
    position:absolute; right:-120px; top:120px;
    width:760px; height:760px; opacity:.12; pointer-events:none;
  }
  .cover__center{
    flex:1; display:flex; flex-direction:column; justify-content:center;
    position:relative; z-index:1;
  }
  .cover__eyebrow{
    font-size:13px; letter-spacing:.36em; font-weight:700;
    color:var(--orange); margin-bottom:22px;
  }
  .cover__title{
    font-family:"Source Serif 4", Georgia, serif;
    font-weight:700; font-size:96px; line-height:.95; letter-spacing:-.015em;
    margin:0; color:#fff;
  }
  .cover__title .accent{color:var(--orange); font-style:italic; font-weight:600}
  .cover__subtitle{
    margin-top:28px; max-width:540px;
    font-size:18px; line-height:1.55; color:rgba(255,255,255,.92); font-weight:300;
  }
  .cover__rule{width:88px; height:4px; background:var(--orange); margin:36px 0 0}
  .cover__bottom{
    display:flex; align-items:flex-end; justify-content:space-between;
    margin:24px 0 36px; position:relative; z-index:1;
  }
  .cover__edition{
    font-size:12px; letter-spacing:.28em; font-weight:600; color:rgba(255,255,255,.75);
  }
  .cover__count{text-align:right}
  .cover__count .num{
    font-family:"Source Serif 4", Georgia, serif;
    font-size:64px; line-height:1; font-weight:700; color:var(--orange);
  }
  .cover__count .lbl{
    font-size:12px; letter-spacing:.24em; font-weight:700;
    color:rgba(255,255,255,.85); margin-top:6px;
  }
  .cover__logo-band{
    margin:0 -64px 0;
    background:#fff;
    padding:26px 64px 28px;
    display:flex; align-items:center; justify-content:space-between;
    border-top:6px solid var(--orange);
  }
  .cover__logo-band img{height:52px; display:block}
  .cover__logo-band .tagline{
    font-size:11px; letter-spacing:.28em; font-weight:700; color:var(--blue-ink);
  }

  /* ============ TOC ============ */
  .toc{padding:48px 56px 56px; display:flex; flex-direction:column}
  .toc__eyebrow{
    font-size:12px; letter-spacing:.32em; font-weight:700; color:var(--orange);
    margin-bottom:10px;
  }
  .toc__title{
    font-family:"Source Serif 4", Georgia, serif;
    font-weight:700; font-size:54px; line-height:1; letter-spacing:-.01em;
    color:var(--blue-ink); margin:0 0 10px;
  }
  .toc__rule{width:64px; height:3px; background:var(--orange); margin:0 0 22px}
  .toc__cats{display:flex; flex-direction:column; gap:16px; flex:1}
  .toc-cat__head{
    display:flex; align-items:baseline; justify-content:space-between;
    border-bottom:1px solid var(--rule); padding-bottom:5px; margin-bottom:8px;
  }
  .toc-cat__name{
    font-family:"Source Serif 4", Georgia, serif; font-weight:700;
    font-size:20px; color:var(--blue-ink);
  }
  .toc-cat__num{
    font-size:10px; letter-spacing:.22em; font-weight:700; color:var(--orange);
  }
  .toc-cat__list{
    columns:3; column-gap:28px;
    margin:0; padding:0; list-style:none;
  }
  .toc-cat__list li{
    break-inside:avoid; padding:2px 0;
    display:flex; align-items:baseline; gap:6px;
    font-size:11.5px; color:var(--text);
  }
  .toc-cat__list .name{flex:1; font-weight:500}
  .toc-cat__list .dot-leader{
    flex-shrink:1;
    border-bottom:1px dotted var(--rule);
    align-self:end; margin:0 6px 5px; min-width:18px;
  }
  .toc-cat__list .pg{font-weight:700; color:var(--blue); font-variant-numeric:tabular-nums; font-size:12px}

  /* ============ DIVIDER ============ */
  .divider{background:var(--blue); color:#fff; display:flex; padding:0; position:relative}
  .divider__left{
    flex:1.15; padding:80px 56px;
    display:flex; flex-direction:column; justify-content:center;
    position:relative; z-index:2;
  }
  .divider__cat-num{
    font-family:"Source Serif 4", Georgia, serif;
    font-size:18px; color:var(--orange); letter-spacing:.28em; font-weight:600;
    margin-bottom:18px;
  }
  .divider__title{
    font-family:"Source Serif 4", Georgia, serif;
    font-size:88px; line-height:.95; font-weight:700; margin:0;
    color:#fff; letter-spacing:-.01em;
  }
  .divider__rule{width:64px; height:3px; background:var(--orange); margin:28px 0 24px}
  .divider__intro{
    font-size:17px; line-height:1.55; color:rgba(255,255,255,.92);
    font-weight:300; max-width:380px;
  }
  .divider__count{
    margin-top:32px; font-size:12px; letter-spacing:.26em;
    font-weight:700; color:var(--orange);
  }
  .divider__right{
    flex:1; position:relative; background:var(--blue-deep); overflow:hidden;
  }
  .divider__hex-stack{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  .divider__hex-main{width:320px; height:277px}
  .divider__hex-sm1{position:absolute; right:40px; top:120px; width:130px; height:113px}
  .divider__hex-sm2{position:absolute; left:30px; bottom:90px; width:110px; height:95px}
  .divider__hex-orange{
    position:absolute; right:80px; bottom:120px; width:96px; height:83px;
    background:var(--orange);
  }

  /* ============ CHALLENGE PAGE ============ */
  .challenge-page{display:grid; grid-template-columns:280px 1fr; height:1056px}
  .challenge-page__rail{
    background:var(--blue); color:#fff;
    padding:56px 28px 56px;
    position:relative; display:flex; flex-direction:column; overflow:hidden;
  }
  .challenge-page__rail::before{
    content:""; position:absolute; inset:0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='70' viewBox='0 0 80 70'><polygon points='40,2 76,22 76,62 40,82 4,62 4,22' fill='none' stroke='white' stroke-width='1' stroke-opacity='0.10'/></svg>");
    background-size:80px 70px;
    pointer-events:none; z-index:0;
  }
  .challenge-page__rail > *{position:relative; z-index:1}
  .rail__header{
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,.22);
    padding-bottom:14px; margin-bottom:6px;
  }
  .rail__cat{font-size:12px; letter-spacing:.28em; font-weight:700; color:var(--orange)}
  .rail__pageno{font-size:11px; letter-spacing:.22em; font-weight:600; color:rgba(255,255,255,.72)}
  .rail__hexes{
    flex:1;
    display:flex; flex-direction:column;
    justify-content:space-evenly; align-items:center;
    padding:16px 0;
  }
  .rail__hex-orange-frame-wrap{
    position:relative; width:100%; aspect-ratio:1 / 0.866;
    display:flex; align-items:center; justify-content:center;
  }
  .rail__hex--orange-frame{
    position:absolute; inset:-6px;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    background:var(--orange);
  }
  .rail__hex{
    position:absolute; inset:0;
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    background-position:center; background-size:cover;
  }
  .rail__hex--orange-frame + .rail__hex{inset:6px}

  .challenge-page__main{
    padding:64px 56px 56px;
    display:flex; flex-direction:column; background:#fff; position:relative;
  }
  .main__top{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:18px;
  }
  .main__cat-tag{font-size:11px; letter-spacing:.28em; font-weight:700; color:var(--orange)}
  .main__brand{font-size:11px; letter-spacing:.22em; font-weight:700; color:var(--blue)}

  .ch-list{
    display:flex; flex-direction:column;
    margin-top:8px; flex:1;
    justify-content:space-evenly;
    padding-bottom:36px;
  }
  .ch{
    padding:18px 0;
    border-bottom:1px solid var(--rule);
    display:flex; gap:18px; align-items:flex-start;
  }
  .ch:last-child{border-bottom:0}
  .ch__body{flex:1; min-width:0}
  .ch__chip{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--soft-bg); color:var(--blue-ink);
    font-size:11px; font-weight:700; letter-spacing:.06em;
    padding:5px 10px; border-radius:99px; margin-bottom:10px;
  }
  .ch__chip .dot{width:6px; height:6px; border-radius:50%; background:var(--orange)}
  .ch__title{
    font-family:"Source Serif 4", Georgia, serif;
    font-weight:700; font-size:24px; line-height:1.15;
    color:var(--blue-ink); margin:0 0 8px; letter-spacing:-.005em;
  }
  .ch__desc{
    font-size:13.5px; line-height:1.55; color:var(--text);
    margin:0 0 12px; max-width:60ch;
  }
  .ch__meta{display:flex; gap:28px; align-items:center; margin-top:10px}
  .meta-item{display:flex; flex-direction:column; gap:2px}
  .meta-item .lbl{
    font-size:10px; letter-spacing:.22em; font-weight:700;
    color:var(--orange); text-transform:uppercase;
  }
  .meta-item .val{font-size:13px; font-weight:600; color:var(--blue-ink)}

  .page__footer{
    position:absolute; left:0; right:0; bottom:0;
    height:36px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 36px; border-top:1px solid var(--rule); background:#fff;
  }
  .page__footer .ft-left{font-size:10px; letter-spacing:.22em; font-weight:700; color:var(--blue)}
  .page__footer .ft-right{font-size:10px; letter-spacing:.22em; font-weight:600; color:var(--muted)}

  /* ============ INDEX PAGE ============ */
  .index-page{padding:64px 56px 72px}
  .index-page .toc__eyebrow,
  .index-page .toc__title,
  .index-page .toc__rule{ /* reuse */ }
  .index-list{
    columns:2; column-gap:36px;
    margin:0; padding:0; list-style:none;
  }
  .index-list li{
    break-inside:avoid; padding:5px 0;
    display:flex; align-items:baseline; gap:8px;
    font-size:13px; color:var(--text);
    border-bottom:1px dotted var(--rule);
  }
  .index-list .name{flex:1; font-weight:500}
  .index-list .cat{
    font-size:10px; letter-spacing:.18em; font-weight:700; color:var(--orange);
    margin-right:8px;
  }
  .index-list .pg{
    font-weight:700; color:var(--blue);
    font-variant-numeric:tabular-nums; font-size:12px; min-width:24px; text-align:right;
  }

  /* ============ BACK COVER ============ */
  .back-cover{
    background:var(--blue); color:#fff;
    display:flex; flex-direction:column;
    padding:72px 64px 0; position:relative;
  }
  .back-cover__hex-art{
    position:absolute; right:-120px; top:120px;
    width:760px; height:760px; opacity:.12; pointer-events:none;
  }
  .back-cover__cross{position:absolute; top:56px; left:64px; width:56px; height:56px; z-index:2}
  .back-cover__cross svg{width:100%; height:100%; display:block}
  .back-cover__center{
    flex:1; display:flex; flex-direction:column; justify-content:center;
    position:relative; z-index:1;
  }
  .back-cover__eyebrow{font-size:13px; letter-spacing:.36em; font-weight:700; color:var(--orange); margin-bottom:22px}
  .back-cover__title{
    font-family:"Source Serif 4", Georgia, serif;
    font-weight:700; font-size:64px; line-height:1; letter-spacing:-.01em;
    margin:0; color:#fff;
  }
  .back-cover__body{
    margin-top:28px; max-width:540px; font-size:17px; line-height:1.6;
    color:rgba(255,255,255,.92); font-weight:300;
  }
  .back-cover__rule{width:64px; height:3px; background:var(--orange); margin:28px 0}
  .back-cover__contact{
    display:grid; grid-template-columns:1fr 1fr; gap:24px;
    max-width:540px; margin-top:8px;
  }
  .bc-item .lbl{font-size:11px; letter-spacing:.22em; font-weight:700; color:var(--orange); margin-bottom:4px}
  .bc-item .val{font-size:15px; font-weight:500; color:#fff}
  .back-cover__logo-band{
    margin:0 -64px 0; background:#fff; padding:26px 64px 28px;
    display:flex; align-items:center; justify-content:space-between;
    border-top:6px solid var(--orange);
  }
  .back-cover__logo-band img{height:52px; display:block}
  .back-cover__logo-band .tagline{
    font-size:11px; letter-spacing:.28em; font-weight:700; color:var(--blue-ink);
  }

  /* ============ FLIPBOOK MODE ============ */
  body[data-mode="flipbook"]{ background:#1a1f2a; }
  body[data-mode="flipbook"] .stack{
    padding:0; gap:0;
    height:calc(100vh - 56px);
    justify-content:center;
    overflow:hidden;
  }
  body[data-mode="flipbook"] .toolbar{
    background:#0f131a; color:#fff; border-bottom:1px solid #2a3142;
  }
  body[data-mode="flipbook"] .toolbar .brand{color:#fff}
  body[data-mode="flipbook"] .toolbar .meta{color:rgba(255,255,255,.6)}
  body[data-mode="flipbook"] .mode-btn{
    background:transparent; color:#fff; border-color:#2a3142;
  }
  body[data-mode="flipbook"] .mode-btn.active{background:var(--orange); border-color:var(--orange)}

  .flipbook{
    position:relative;
    width: 1632px; /* 2 pages */
    height: 1056px;
    display:none;
    perspective: 2400px;
    transform-origin: center;
  }
  body[data-mode="flipbook"] .flipbook{display:block}
  body[data-mode="flipbook"] .page{
    /* hide print pages — they show via flipbook spreads */
    display:none;
  }

  .fb-spread{
    position:absolute; inset:0;
    transform-style:preserve-3d;
  }
  .fb-page{
    position:absolute; top:0;
    width:816px; height:1056px;
    backface-visibility:hidden;
    box-shadow: 0 8px 28px rgba(0,0,0,.5);
    background:#fff;
    overflow:hidden;
    transform-style:preserve-3d;
    transition: transform .85s cubic-bezier(.45,.05,.25,1);
    transform-origin: left center;
  }
  .fb-page.left{ left:0 }
  .fb-page.right{ left:816px; transform-origin: left center }
  .fb-page.flipping{ z-index: 10 }
  .fb-page.flipped{ transform: rotateY(-180deg) }
  /* simple shadow during flip */
  .fb-page::after{
    content:""; position:absolute; inset:0;
    background:linear-gradient(to right, rgba(0,0,0,0) 60%, rgba(0,0,0,.18));
    opacity:0; transition:opacity .4s;
    pointer-events:none;
  }
  .fb-page.flipping::after{opacity:1}

  .fb-controls{
    position:absolute; left:50%; transform:translateX(-50%);
    bottom:-56px;
    display:flex; align-items:center; gap:18px;
    color:#fff;
  }
  .fb-arrow{
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.08); color:#fff; border:1px solid rgba(255,255,255,.16);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .fb-arrow:hover{background:rgba(255,255,255,.16)}
  .fb-arrow:disabled{opacity:.3; cursor:not-allowed}
  .fb-progress{
    font-size:12px; letter-spacing:.18em; font-weight:600;
    color:rgba(255,255,255,.85);
    min-width:120px; text-align:center;
  }
  .fb-progress strong{color:var(--orange)}

  /* viewport scaling for flipbook */
  .fb-scale-wrap{
    transform-origin: center center;
    transition: transform .2s ease;
  }

  /* ============ PRINT ============ */
  @media print {
    @page { size: 8.5in 11in; margin: 0; }
    body{ background:#fff }
    .toolbar, .fb-controls{ display:none }
    .stack{ padding:0; gap:0 }
    .page{ box-shadow:none; margin:0 }
    body[data-mode="flipbook"] .flipbook{display:none}
    body[data-mode="flipbook"] .page{display:block}
  }
</style>
</head>
<body data-mode="paged">

<div class="toolbar">
  <div class="left">
    <div class="brand">CONCENTRA · CHALLENGES PROGRAM CATALOG</div>
    <div class="meta" id="meta">VERSION 26 · 24 PAGES</div>
  </div>
  <div class="modes">
    <button class="mode-btn active" data-mode="paged">PRINT VIEW</button>
    <button class="mode-btn" data-mode="flipbook">FLIPBOOK</button>
    <button class="print-btn" id="printBtn">SAVE AS PDF</button>
  </div>
</div>

<div class="stack" id="stack">
  <!-- pages render here -->
  <div class="flipbook" id="flipbook"></div>
</div>

<script src="catalog-data.js?v=2"></script>
<script src="catalog-render.js?v=2"></script>
</body>
</html>
